version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - npm install -g pnpm@latest
            - pnpm install --frozen-lockfile
        build:
          commands:
            - echo "Building Next.js application..."
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
          - .next/cache/**/*
      env:
        ssr_enabled: true
